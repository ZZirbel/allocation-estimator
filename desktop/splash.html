<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .splash {
      background: linear-gradient(145deg, #0f172a, #1e293b);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 36px 48px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0 60%, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .loader {
      width: 120px;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      animation: slide 1.2s ease infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="title">Allocation Estimator</div>
    <div class="subtitle">Starting server...</div>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>
</body>
</html>
